# Example settings.yaml — copy to ~/.kira/settings.yaml

providers:
  openrouter:
    type: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    default_headers:
      HTTP-Referer: "https://github.com/yourname/kira"
    models:
      - anthropic/claude-sonnet-4-20250514
      - google/gemini-2.5-flash
      - deepseek/deepseek-chat

  anthropic:
    type: anthropic
    api_key_env: ANTHROPIC_API_KEY
    models:
      - claude-sonnet-4-20250514
      - claude-haiku-4-5-20251001

  ollama:
    type: openai_compatible
    base_url: http://localhost:11434/v1
    api_key: "ollama"
    models:
      - llama3.1:8b

routing:
  default: openrouter/anthropic/claude-sonnet-4-20250514
  fallback_chain:
    - openrouter/google/gemini-2.5-flash
  task_routing:
    summarize: openrouter/google/gemini-2.5-flash
    code: openrouter/anthropic/claude-sonnet-4-20250514

agent:
  max_iterations: 25
  max_cost_per_turn: 1.00
  temperature: 0.7

logging:
  level: INFO
  file: ~/.kira/logs/kira.log
