name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Automated Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff

      - name: Get changed Python files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/main...HEAD -- '*.py' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      - name: Lint changed files
        if: steps.changed.outputs.files != ''
        run: |
          echo "## Lint Results" > review.md
          if ruff check ${{ steps.changed.outputs.files }} 2>&1; then
            echo "No lint issues found." >> review.md
          else
            echo '```' >> review.md
            ruff check ${{ steps.changed.outputs.files }} 2>&1 >> review.md || true
            echo '```' >> review.md
          fi

      - name: Check line count
        run: |
          LINES=$(find kira -name "*.py" -exec cat {} + | wc -l)
          echo "" >> review.md
          echo "## Codebase Size" >> review.md
          echo "Total Python lines: **$LINES** / 10,000 limit" >> review.md
          if [ "$LINES" -gt 10000 ]; then
            echo "**WARNING: Codebase exceeds 10,000 line limit!**" >> review.md
          fi

      - name: Import sanity check
        run: |
          echo "" >> review.md
          echo "## Import Check" >> review.md
          if python -c "from kira.core.agent import Agent; from kira.tools.registry import ToolRegistry; r = ToolRegistry(); r.load_builtin(); print(f'{len(r.list_schemas())} tools loaded')" 2>&1; then
            echo "All imports OK." >> review.md
          else
            echo "**IMPORT FAILURE** — see logs." >> review.md
          fi

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            const body = `### Kira CI Review\n\n${review}`;

            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.body.includes('Kira CI Review') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
